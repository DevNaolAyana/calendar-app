<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Calendar App</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Login/Signup Screen -->
    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <i class="fas fa-calendar-alt" style="font-size: 50px; color: #667eea; display: block; text-align: center; margin-bottom: 20px;"></i>
            <h2>Calendar App</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login"><i class="fas fa-sign-in-alt"></i> Login</button>
                <button class="auth-tab" data-tab="signup"><i class="fas fa-user-plus"></i> Sign Up</button>
            </div>
            
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
                <p class="error-message" id="loginError"></p>
            </form>
            
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Password" required>
                </div>
                <button type="submit"><i class="fas fa-user-plus"></i> Sign Up</button>
                <p class="error-message" id="signupError"></p>
            </form>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="appScreen" style="display: none;">
        <div class="app-header">
            <div>
                <h1><i class="fas fa-calendar-alt"></i> My Calendar</h1>
                <div id="currentDateTime" class="date-time-display"></div>
            </div>
            <div>
                <button id="darkModeToggle" class="dark-mode-btn"><i class="fas fa-moon"></i> Dark</button>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- Daily + Reminders Row -->
        <div class="daily-reminders-row">

            <!-- Day View -->
            <div class="day-view">
                <div class="view-header">
                    <button id="prevDay"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="dayTitle"></h2>
                    <button id="nextDay"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="dayView" class="day-view-container"></div>
            </div>

            <!-- Reminders Table -->
            <div class="reminders-section">
                <div class="reminders-header">
                    <h3><i class="fas fa-bell"></i> Reminders</h3>
                    <button id="addReminderBtn" class="add-btn"><i class="fas fa-plus"></i> Add Reminder</button>
                </div>
                <table id="remindersTable" class="reminders-table">
                    <thead>
                        <tr>
                            <th><i class="fas fa-tag"></i> <span class="header-text">Title</span></th>
                            <th><i class="fas fa-calendar-day"></i> <span class="header-text">Date</span></th>
                            <th><i class="fas fa-clock"></i> <span class="header-text">Time</span></th>
                            <th><i class="fas fa-sticky-note"></i> <span class="header-text">Notes</span></th>
                            <th><i class="fas fa-cogs"></i> <span class="header-text">Actions</span></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </div><!-- end daily-reminders-row -->

        <!-- Week View -->
        <div class="week-view">
            <div class="view-header">
                <button id="prevWeek"><i class="fas fa-chevron-left"></i></button>
                <h2 id="weekTitle"></h2>
                <button id="nextWeek"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div id="weekView" class="week-view-container"></div>
        </div>

        <!-- Month View -->
        <div class="month-view">
            <div class="view-header">
                <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                <h2 id="monthTitle"></h2>
                <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div id="monthView" class="month-view-container"></div>
        </div>

    </div>

    <!-- Task Modal -->
        <div id="taskModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3><i class="fas fa-tasks"></i> <span id="taskModalTitle">Add Task</span></h3>
                <form id="taskForm">
                    <div class="input-group">
                        <i class="fas fa-heading"></i>
                        <input type="text" id="taskTitle" placeholder="Title" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-align-left"></i>
                        <textarea id="taskDesc" placeholder="Description"></textarea>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-location-dot"></i>
                        <input type="text" id="taskLocation" placeholder="Location">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-calendar"></i>
                        <input type="date" id="taskDate" required>
                    </div>
                    <div class="row">
                        <div class="input-group half">
                            <i class="fas fa-play"></i>
                            <input type="time" id="taskStartTime" step="60" required>
                        </div>
                        <div class="input-group half">
                            <i class="fas fa-stop"></i>
                            <input type="time" id="taskEndTime" step="60" required>
                        </div>
                    </div>
                    <div class="recurring-options">
                        <label>
                            <input type="checkbox" id="isRecurring"> <i class="fas fa-repeat"></i> Recurring
                        </label>
                        <select id="recurringType" style="display:none;">
                            <option value="daily"><i class="fas fa-calendar-day"></i> Daily</option>
                            <option value="weekly"><i class="fas fa-calendar-week"></i> Weekly</option>
                            <option value="monthly"><i class="fas fa-calendar-alt"></i> Monthly</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button type="submit" style="flex: 2;"><i class="fas fa-save"></i> Save Task</button>
                        <button type="button" id="deleteFromModalBtn" class="delete-modal-btn" style="flex: 1; background: #e74c3c;"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </form>
            </div>
        </div>
    <!-- Reminder Modal -->
    <div id="reminderModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3><i class="fas fa-bell"></i> Add Reminder</h3>
            <form id="reminderForm">
                <div class="input-group">
                    <i class="fas fa-heading"></i>
                    <input type="text" id="reminderTitle" placeholder="Title" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar"></i>
                    <input type="date" id="reminderDate" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-clock"></i>
                    <input type="time" id="reminderTime" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-sticky-note"></i>
                    <textarea id="reminderNotes" placeholder="Notes"></textarea>
                </div>
                <button type="submit"><i class="fas fa-save"></i> Save Reminder</button>
            </form>
        </div>
    </div>

    <!-- Snooze Modal -->
    <div id="snoozeModal" class="modal">
        <div class="modal-content" style="max-width: 300px;">
            <span class="close snooze-close">&times;</span>
            <h3 style="margin-bottom: 10px;"><i class="fas fa-bed"></i> Snooze Reminder</h3>
            <p style="font-size: 14px; margin-bottom: 20px;">Remind me again in:</p>
            <form id="snoozeForm">
                <div class="input-group">
                    <i class="fas fa-hourglass-half"></i>
                    <select id="snoozeHours" required>
                        <option value="1">1 hour</option>
                        <option value="2">2 hours</option>
                        <option value="4">4 hours</option>
                        <option value="6">6 hours</option>
                    </select>
                </div>
                <button type="submit" style="background: #e67e22;"><i class="fas fa-check"></i> Snooze</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
